version: "3"
services:
  # Optional local Postgres (docker compose --profile local up).
  # Default stack uses PREST_PG_URL from .env (remote).
  postgres:
    profiles: ["local"]
    image: postgres:18
    volumes:
      - "./data/postgres:/var/lib/postgresql"
    environment:
      - POSTGRES_DB=prest
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [
          "CMD-SHELL",
          "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"
        ]
      interval: 30s
      retries: 3
  prest:
    build: .
    restart: on-failure
    env_file:
      - .env
    environment:
      - PREST_DEBUG=true
      - PREST_PG_URL=${PREST_PG_URL}
      - PREST_PG_CACHE=false
      - PREST_JWT_DEFAULT=false
      - PREST_CACHE_ENABLED=false
    ports:
      - "3000:3000"
