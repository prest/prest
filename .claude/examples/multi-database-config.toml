# pREST Multi-Database Configuration Examples
#
# pREST can serve multiple SQL databases simultaneously through a single REST API.
# Each database gets its own adapter (Postgres, TimescaleDB, MySQL, etc.) and is
# selected automatically based on the database name in the request URL.
#
# Request routing: GET /{database}/{schema}/{table}
# Example: GET /timescaledb/public/metrics → uses timescaledb adapter
#          GET /warehouse/analytics/sales   → uses warehouse adapter

# ============================================================================
# Example 1: Postgres + TimescaleDB (single server, multiple databases)
# ============================================================================

[[databases]]
alias = "postgres"
host = "localhost"
port = 5432
user = "prest"
pass = "prest"
database = "app_db"
maxopenconn = 10
maxidleconn = 2

[[databases]]
alias = "timescaledb"
host = "localhost"
port = 5432
user = "prest"
pass = "prest"
database = "metrics"
maxopenconn = 10
maxidleconn = 2


# ============================================================================
# Example 2: Postgres + TimescaleDB + MySQL (distributed setup)
# ============================================================================

[[databases]]
alias = "postgres"
host = "postgres.internal"
port = 5432
user = "prest"
pass = "${POSTGRES_PASSWORD}"
database = "app_db"

[[databases]]
alias = "timescaledb"
host = "timescale.internal"
port = 5432
user = "prest"
pass = "${TIMESCALE_PASSWORD}"
database = "metrics"

[[databases]]
alias = "warehouse"
url = "mysql://prest:${MYSQL_PASSWORD}@mysql.internal:3306/data"
maxopenconn = 20
maxidleconn = 5


# ============================================================================
# Example 3: Using connection URLs (alternative format)
# ============================================================================

[[databases]]
alias = "prod_postgres"
url = "postgres://user:pass@db1.example.com:5432/production?sslmode=require"

[[databases]]
alias = "prod_timescale"
url = "postgres://user:pass@ts1.example.com:5432/metrics?sslmode=require"

[[databases]]
alias = "analytics_mysql"
url = "mysql://user:pass@mysql1.example.com:3306/analytics"


# ============================================================================
# Example 4: With SSL configuration per database
# ============================================================================

[[databases]]
alias = "secure_postgres"
host = "db.internal"
port = 5432
user = "prest"
pass = "password"
database = "secure_app"

[databases.ssl]
mode = "require"
cert = "/etc/prest/certs/client.crt"
key = "/etc/prest/certs/client.key"
rootcert = "/etc/prest/certs/ca.crt"

[[databases]]
alias = "secure_timescale"
host = "ts.internal"
port = 5432
user = "prest"
pass = "password"
database = "metrics"

[databases.ssl]
mode = "verify-full"
rootcert = "/etc/prest/certs/ca.crt"


# ============================================================================
# How It Works
# ============================================================================
#
# 1. Configuration Loading:
#    - Each [[databases]] entry is parsed during app startup
#    - pREST auto-detects the database type (Postgres, TimescaleDB, MySQL, etc.)
#    - An adapter is created and connected for each database
#    - All adapters are registered in a registry keyed by alias
#
# 2. Request Routing:
#    - Incoming request: GET /timescaledb/public/metrics
#    - Middleware extracts "timescaledb" from the URL path
#    - Registry looks up the timescaledb adapter
#    - Adapter is attached to the request context
#    - Handler uses the correct adapter for that database
#
# 3. Adapter Selection:
#    - For each database, pREST tries to detect the type:
#      a. Try TimescaleDB (check for timescaledb extension)
#      b. Fall back to Postgres (always succeeds for Postgres-compatible DBs)
#      c. Future: MySQL, SQLite, CockroachDB detection
#
# 4. Query Execution:
#    - All REST operations (CRUD, schema discovery, custom queries) use
#      the selected adapter for that database
#    - Each database can have different features/operators available
#    - Example: time_bucket() works for TimescaleDB, not stock Postgres


# ============================================================================
# Usage Examples
# ============================================================================
#
# List tables from postgres database:
#   curl http://localhost:3000/postgres/public
#
# Query a table from timescaledb:
#   curl http://localhost:3000/timescaledb/public/metrics
#
# Use time_bucket with TimescaleDB:
#   curl "http://localhost:3000/timescaledb/public/metrics?_groupby=time_bucket(%271%20hour%27,time)"
#
# Query warehouse (MySQL):
#   curl http://localhost:3000/warehouse/sales/orders
#
# Insert data into Postgres:
#   curl -X POST http://localhost:3000/postgres/public/users \
#     -H "Content-Type: application/json" \
#     -d '{"name": "Alice", "email": "alice@example.com"}'
#
# Create a custom query (stored on TimescaleDB):
#   curl -X POST http://localhost:3000/timescaledb/_queries \
#     -H "Content-Type: application/json" \
#     -d '{"name": "hourly_stats", "query": "SELECT time_bucket(...)"}'


# ============================================================================
# Environment Variable Support
# ============================================================================
#
# Use environment variables for secrets (all PREST_ prefixed variables
# override config file values):
#
#   export PREST_DATABASES_0_ALIAS=postgres
#   export PREST_DATABASES_0_PASS=${POSTGRES_PASSWORD}
#   export PREST_DATABASES_1_ALIAS=timescaledb
#   export PREST_DATABASES_1_PASS=${TIMESCALE_PASSWORD}
#
# Or use URL-based configuration:
#
#   export PREST_DATABASES_0_URL=postgres://user:pass@host/db
#   export PREST_DATABASES_1_URL=postgres://user:pass@ts-host/metrics
