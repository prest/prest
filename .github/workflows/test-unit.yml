name: test-unit
run-name: unit tests

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26

      - name: Run unit tests
        run: make test-unit

      - name: Upload code coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
