name: "CodeQL"

on:
  push:
    branches: [main]
    paths-ignore: ['data/*']

  pull_request:
    branches: [main]
    paths-ignore: ['data/*']

  schedule:
    - cron: '0 11 * * 2'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['go']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          persist-credentials: false

      - run: git checkout HEAD^2
        if: ${{ github.event_name == 'pull_request' }}

      # pREST uses validated identifiers/operators and $n binding in SQL; legacy
      # auth.encrypt modes verify pre-hashed DB values with MD5/SHA1.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: autobuild
          config: |
            query-filters:
              - exclude:
                  id: go/sql-injection
              - exclude:
                  id: go/weak-sensitive-data-hashing

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
