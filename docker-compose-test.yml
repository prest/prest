x-prest-env: &prest-env
  PREST_MIGRATIONS: /workspace/testdata/migrations
  PREST_QUERIES_LOCATION: /workspace/testdata/queries
  PREST_PG_HOST: postgres
  PREST_PG_HOST_B: postgres-b
  PREST_PG_PORT: "5432"
  PREST_PG_USER: postgres
  PREST_PG_PASS: postgres
  PREST_PG_DATABASE: prest-test
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/prest-test?sslmode=disable
  PGPASSWORD: postgres
  GOTOOLCHAIN: auto
  GOPROXY: https://proxy.golang.org,direct

x-prestd-service: &prestd-service
  image: golang:1.26-bookworm
  working_dir: /workspace
  volumes:
    - ./:/workspace

services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  postgres-b:
    image: postgres:16
    environment:
      - POSTGRES_DB=secondary-cluster
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  db-init:
    <<: *prestd-service
    depends_on:
      postgres:
        condition: service_healthy
      postgres-b:
        condition: service_healthy
    environment:
      <<: *prest-env
    command: >-
      bash -lc "apt-get update && apt-get install -y --no-install-recommends postgresql-client git ca-certificates && bash -x ./testdata/db-init.sh"
    restart: "no"

  prestd:
    <<: *prestd-service
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      <<: *prest-env
      PREST_CONF: /workspace/testdata/prest.toml
      PREST_DEBUG: "true"
      PREST_JWT_DEFAULT: "false"
      PREST_CACHE_ENABLED: "false"
      PREST_ACCESS_RESTRICT: "false"
      PREST_PG_SINGLE: "false"
      PREST_HTTP_PORT: "3000"
    command: >-
      bash -lc "export PATH=/usr/local/go/bin:/go/bin:$$PATH && apt-get update && apt-get install -y --no-install-recommends curl ca-certificates && go run ./cmd/prestd/main.go"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/_health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s

  prestd-multicluster:
    <<: *prestd-service
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      postgres-b:
        condition: service_healthy
    environment:
      <<: *prest-env
      PREST_CONF: /workspace/testdata/prest_multicluster.toml
      PREST_DEBUG: "true"
      PREST_JWT_DEFAULT: "false"
      PREST_CACHE_ENABLED: "false"
      PREST_HTTP_PORT: "3001"
    command: >-
      bash -lc "export PATH=/usr/local/go/bin:/go/bin:$$PATH && apt-get update && apt-get install -y --no-install-recommends curl ca-certificates && go run ./cmd/prestd/main.go"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3001/_health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s

  prestd-auth:
    <<: *prestd-service
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      <<: *prest-env
      PREST_CONF: /workspace/testdata/prest.toml
      PREST_DEBUG: "true"
      PREST_JWT_DEFAULT: "false"
      PREST_CACHE_ENABLED: "false"
      PREST_AUTH_ENABLED: "true"
      PREST_JWT_KEY: integration-test-secret
      PREST_PG_SINGLE: "false"
      PREST_HTTP_PORT: "3002"
    command: >-
      bash -lc "export PATH=/usr/local/go/bin:/go/bin:$$PATH && apt-get update && apt-get install -y --no-install-recommends curl ca-certificates && go run ./cmd/prestd/main.go"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3002/_health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s

  tests:
    <<: *prestd-service
    depends_on:
      prestd:
        condition: service_healthy
      prestd-multicluster:
        condition: service_healthy
      prestd-auth:
        condition: service_healthy
    environment:
      <<: *prest-env
      PREST_CONF: /workspace/testdata/prest.toml
      PREST_TEST_URL: http://prestd:3000
      PREST_MULTICLUSTER_TEST_URL: http://prestd-multicluster:3001
      PREST_AUTH_TEST_URL: http://prestd-auth:3002
    command: >-
      bash -lc "apt-get update && apt-get install -y --no-install-recommends postgresql-client git ca-certificates && bash -x ./testdata/runtest.sh"
